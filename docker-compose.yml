version: '3.8'

services:

  kafka:
    image: apache/kafka:latest
    container_name: sporty-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw

  rocketmq-namesrv:
    image: apache/rocketmq:latest
    container_name: sporty-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    environment:
      - JAVA_OPT_EXT=-server -Xms256m -Xmx256m

  rocketmq-broker:
    image: apache/rocketmq:latest
    container_name: sporty-rocketmq-broker
    ports:
      - "10911:10911"
      - "10909:10909"
    # brokerIP1 in broker-docker.conf so NameServer returns 127.0.0.1 (reachable from Windows host).
    # JVM -Drocketmq.broker.ip1 is not reliably applied by this image's mqbroker entrypoint.
    volumes:
      - ./docker/rocketmq/broker-docker.conf:/tmp/broker-docker.conf:ro
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /tmp/broker-docker.conf
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      - JAVA_OPT_EXT=-server -Xms256m -Xmx512m
    depends_on:
      - rocketmq-namesrv

  # Browse RocketMQ topics and messages in the browser
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:2.1.0
    container_name: sporty-rocketmq-dashboard
    ports:
      # Dashboard 2.1.x listens on 8082 inside the container
      - "8091:8082"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    depends_on:
      - rocketmq-namesrv
