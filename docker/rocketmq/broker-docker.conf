# Used when Spring Boot runs on the host: NameServer must advertise 127.0.0.1:10911
# (Docker publishes these ports to localhost). Container-only clients use the same via host port mapping.

brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH

brokerIP1 = 127.0.0.1
listenPort = 10911
namesrvAddr = rocketmq-namesrv:9876
autoCreateTopicEnable = true
