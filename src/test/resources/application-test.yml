spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  autoconfigure:
    exclude: org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration

app:
  rocketmq:
    mock: true

logging:
  level:
    com.sporty.betting: INFO
